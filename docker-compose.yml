version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:14-alpine
    container_name: umrahconnect-postgres
    environment:
      POSTGRES_DB: umrahconnect
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - umrahconnect-network

  # MongoDB
  mongodb:
    image: mongo:6
    container_name: umrahconnect-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
      MONGO_INITDB_DATABASE: umrahconnect
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - umrahconnect-network

  # Redis
  redis:
    image: redis:7-alpine
    container_name: umrahconnect-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - umrahconnect-network

  # Elasticsearch
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: umrahconnect-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - umrahconnect-network

  # RabbitMQ
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: umrahconnect-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin123
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - umrahconnect-network

  # Backend API Gateway
  api-gateway:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: umrahconnect-api-gateway
    environment:
      NODE_ENV: development
      PORT: 5000
      DB_HOST: postgres
      MONGO_URI: mongodb://admin:admin123@mongodb:27017/umrahconnect?authSource=admin
      REDIS_HOST: redis
      ELASTICSEARCH_NODE: http://elasticsearch:9200
      RABBITMQ_URL: amqp://admin:admin123@rabbitmq:5672
    ports:
      - "5000:5000"
    depends_on:
      - postgres
      - mongodb
      - redis
      - elasticsearch
      - rabbitmq
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - umrahconnect-network
    command: npm run dev

  # Frontend Web App
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: umrahconnect-frontend
    environment:
      REACT_APP_API_URL: http://localhost:5000
    ports:
      - "3000:3000"
    depends_on:
      - api-gateway
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - umrahconnect-network
    command: npm start

volumes:
  postgres_data:
  mongodb_data:
  redis_data:
  elasticsearch_data:
  rabbitmq_data:

networks:
  umrahconnect-network:
    driver: bridge
